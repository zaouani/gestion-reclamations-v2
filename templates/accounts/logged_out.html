{% extends 'base.html' %}

{% block title %}Déconnexion{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="fas fa-check-circle"></i> Déconnexion réussie</h4>
                </div>
                <div class="card-body text-center">
                    <p class="lead">Vous avez été déconnecté avec succès.</p>
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary">
                        <i class="fas fa-sign-in-alt"></i> Se reconnecter
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
